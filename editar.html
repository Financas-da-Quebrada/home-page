<section class="dashboard">

<div class="container">

<h1>Editar Informações</h1>

<p>Atualize os dados do seu comércio e gerencie os cursos disponíveis.</p>

<!-- EDITAR COMÉRCIO -->

<div class="edit-section">

<h2>Meu Comércio</h2>

<p class="subtitulo">Edite as informações do seu negócio</p>

<form id="form-comercio" class="form-grid">

<div class="input-group">
<label for="nome">Nome do comércio</label>
<input type="text" id="nome" required>
</div>

<div class="input-group">
<label for="categoria">Categoria</label>
<select id="categoria">
<option>Mercado</option>
<option>Loja de roupas</option>
<option>Salão de beleza</option>
<option>Alimentação</option>
<option>Serviços</option>
<option>Outro</option>
</select>
</div>

<div class="input-group">
<label for="telefone">Telefone</label>
<input type="text" id="telefone" placeholder="(11) 99999-9999" required>
</div>

<div class="input-group">
<label for="cidade">Cidade</label>
<input type="text" id="cidade" required>
</div>

</form>

<div class="edit-actions">
<button type="submit" form="form-comercio" class="btn-primary">Salvar Alterações</button>
</div>

</div>
